<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Acceso - AgroDirecto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0
    ,400;0,700;1,400;1,700&family=Fjalla+One&family=JetBrains+Mono:ital,wght@0
    ,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400..700;1,400..
    700&family=Press+Start+2P&family=Roboto:ital,wght@0,100..900;1,100..900&family
    =Space+Grotesk:wght@300..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,
    300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAV STICKY (position: sticky; top: 0; z-index: 1000) -->
    <nav id="navegacion-principal">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <div class="enlaces-nav">
            <a href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <!-- Formulario: .contenedor-formulario tiene position: relative
         con ::before como barra de color (position: absolute) -->
    <main class="contenedor-formulario">
        <h2>Iniciar Sesion</h2>
        <p>Ingrese sus credenciales para gestionar sus cultivos o reservas.</p>

        <form action="panel.html">
            <div class="grupo-formulario">
                <label for="correo">Correo Electronico</label>
                <input type="email" id="correo" class="campo-formulario" placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-formulario">
                <label for="clave">Contrasena</label>
                <input type="password" id="clave" class="campo-formulario" placeholder="Contrasena">
            </div>
            <div class="accion-formulario">
                <button type="submit" class="boton-accion">Ingresar</button>
            </div>
        </form>

        <div class="pie-formulario">
            No tiene cuenta? <a href="registro.html">Registrese aqui</a>
        </div>
    </main>

    <footer id="pie-pagina-principal">
        <p><strong>AgroDirecto</strong> - Del campo a su negocio, sin rodeos. 2025</p>
    </footer>

</body>
</html>
