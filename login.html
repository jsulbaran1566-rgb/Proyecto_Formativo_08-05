<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Acceso - AgroDirecto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAV STICKY (position: sticky; top: 0; z-index: 1000) -->
    <nav id="navegacion-principal">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <div class="enlaces-nav">
            <a href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <!-- Formulario: .contenedor-formulario tiene position: relative
         con ::before como barra de color (position: absolute) -->
    <main class="contenedor-formulario">
        <h2>Iniciar Sesion</h2>
        <p>Ingrese sus credenciales para gestionar sus cultivos o reservas.</p>

        <form action="panel.html">
            <div class="grupo-formulario">
                <label for="correo">Correo Electronico</label>
                <input type="email" id="correo" class="campo-formulario" placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-formulario">
                <label for="clave">Contrasena</label>
                <input type="password" id="clave" class="campo-formulario" placeholder="Contrasena">
            </div>
            <div class="accion-formulario">
                <button type="submit" class="boton-accion">Ingresar</button>
            </div>
        </form>

        <div class="pie-formulario">
            No tiene cuenta? <a href="registro.html">Registrese aqui</a>
        </div>
    </main>

    <footer id="pie-pagina-principal">
        <p><strong>AgroDirecto</strong> - Del campo a su negocio, sin rodeos. 2025</p>
    </footer>


<!-- =====================================================
     SCRIPT PARA: login.html
     Valida credenciales contra GET /usuarios
     y redirige según el rol del usuario.
     ===================================================== -->
<script>
    const API_USUARIOS = "http://127.0.0.1:8000/usuarios";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const id  = parseInt(document.getElementById("loginId").value);
        const rol = document.getElementById("loginRol").value;

        try {
            const respuesta = await fetch(API_USUARIOS);
            const usuarios  = await respuesta.json();

            const usuario = usuarios.find(u => u.id === id && u.rol === rol);

            if (usuario) {
                // Guardar sesión básica en sessionStorage
                sessionStorage.setItem("usuario_id",     usuario.id);
                sessionStorage.setItem("usuario_nombre", usuario.nombre);
                sessionStorage.setItem("usuario_rol",    usuario.rol);

                // Redirigir según rol
                if (rol === "Administrador" || rol === "Productor") {
                    window.location.href = "panel.html";
                } else if (rol === "Comprador") {
                    window.location.href = "panel_cliente.html";
                }
            } else {
                alert("ID o rol incorrecto. Verifica tus datos.");
            }
        } catch (error) {
            console.error("Error al iniciar sesión:", error);
            alert("No se pudo conectar con el servidor.");
        }
    });
</script>

</body>
</html>
