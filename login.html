<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Acceso - AgroDirecto</title>
</head>
<body>

    <nav id="main-nav">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <div class="nav-links">
            <a href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <main class="contenedor-formulario">
        <h2>Iniciar Sesión</h2>
        <p>Ingrese sus credenciales para gestionar sus cultivos o reservas.</p>

        <form action="panel.html">
            <div class="form-grupo">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" class="input-formulario" placeholder="ejemplo@correo.com">
            </div>
            <div class="form-grupo">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" class="input-formulario" placeholder="Contraseña">
            </div>
            <div class="form-accion">
                <button type="submit" class="btn-accion">Ingresar</button>
            </div>
        </form>

        <div class="form-pie">
            ¿No tiene cuenta? <a href="registro.html">Regístrese aquí</a>
        </div>
    </main>

    <footer id="footer-principal">
        <p><strong>AgroDirecto</strong> &mdash; Del campo a su negocio, sin rodeos. &copy; 2025</p>
    </footer>

</body>
</html>
