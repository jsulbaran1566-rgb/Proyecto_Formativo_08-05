<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Registro - AgroDirecto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0
    ,400;0,700;1,400;1,700&family=Fjalla+One&family=JetBrains+Mono:ital
    ,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400
    ..700;1,400..700&family=Press+Start+2P&family=Roboto:ital,wght@0,100..
    900;1,100..900&family=Space+Grotesk:wght@300..700&family=Ubuntu:ital,
    wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAV STICKY (position: sticky; top: 0; z-index: 1000) -->
    <nav id="navegacion-principal">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <div class="enlaces-nav">
            <a href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <!-- .contenedor-formulario: position: relative con ::before (position: absolute) como barra superior -->
    <main class="contenedor-formulario contenedor-formulario-md">
        <h2>Crear Cuenta</h2>
        <p>Unase a la plataforma de comercio agricola directo.</p>

        <form action="panel.html">
            <div class="grupo-formulario">
                <label for="nombre">Nombre Completo / Razon Social</label>
                <input type="text" id="nombre" class="campo-formulario" placeholder="Ej: Finca El Paraiso">
            </div>
            <div class="grupo-formulario">
                <label for="correo">Correo Electronico</label>
                <input type="email" id="correo" class="campo-formulario" placeholder="correo@empresa.com">
            </div>
            <div class="grupo-formulario">
                <label for="telefono">Telefono / WhatsApp</label>
                <input type="tel" id="telefono" class="campo-formulario" placeholder="+57 300 000 0000">
            </div>
            <div class="grupo-formulario">
                <label for="rol">Seleccione su rol</label>
                <select id="rol" class="campo-formulario">
                    <option value="">-- Seleccione --</option>
                    <option value="productor">Productor (Gestionar fincas y lotes)</option>
                    <option value="comprador">Comprador (Restaurante / Hotel / Distribuidor)</option>
                </select>
            </div>
            <div class="grupo-formulario">
                <label for="clave">Contrasena</label>
                <input type="password" id="clave" class="campo-formulario" placeholder="Minimo 8 caracteres">
            </div>
            <div class="accion-formulario">
                <button type="submit" class="boton-accion">Crear mi Cuenta</button>
            </div>
        </form>

        <div class="pie-formulario">
            Ya tiene cuenta? <a href="login.html">Inicie sesion aqui</a>
        </div>
    </main>

    <footer id="pie-pagina-principal">
        <p><strong>AgroDirecto</strong> - Del campo a su negocio, sin rodeos. 2025</p>
    </footer>

<!-- =====================================================
     SCRIPT PARA: registro.html
     Ruta usada:
       POST /usuarios?id=&nombre=&rol=
     Inputs requeridos: "regId", "regNombre", "regRol"
     ===================================================== -->
<script>
    const API_USUARIOS   = "http://127.0.0.1:8000/usuarios";
    const ROLES_VALIDOS  = ["Productor", "Comprador", "Administrador"];

    document.getElementById("registroForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const id     = document.getElementById("regId").value;
        const nombre = document.getElementById("regNombre").value.trim();
        const rol    = document.getElementById("regRol").value;

        if (!ROLES_VALIDOS.includes(rol)) {
            alert("Rol inválido. Elige: Productor, Comprador o Administrador.");
            return;
        }

        try {
            const respuesta = await fetch(
                `${API_USUARIOS}?id=${id}&nombre=${encodeURIComponent(nombre)}&rol=${encodeURIComponent(rol)}`,
                { method: "POST" }
            );

            if (respuesta.ok) {
                alert("Usuario registrado correctamente. Ahora puedes iniciar sesión.");
                window.location.href = "login.html";
            } else {
                const err = await respuesta.json();
                alert("Error: " + (err.detail || err.error));
            }
        } catch (error) {
            console.error("Error en registro:", error);
            alert("No se pudo conectar con el servidor.");
        }
    });
</script>

</body>
</html>
