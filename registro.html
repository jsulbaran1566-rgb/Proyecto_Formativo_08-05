<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>Registro - AgroDirecto</title>
</head>
<body>
    <nav id="main-nav">
        <a href="index.html"><strong>AGRODIRECTO</strong></a>
        <a href="index.html">Volver al Inicio</a>
    </nav>

    <main class="contenedor-formulario">
        <h2>Crear Cuenta</h2>
        <form>
            <label>Nombre Completo / Razón Social:</label>
            <br>
            <input type="text" class="input-formulario">
            <br>
            <label>Correo Electrónico:</label>
            <br>
            <input type="email" class="input-formulario">
            <br>
            <label>Seleccione su rol:</label>
            <br>
            <select class="input-formulario">
                <option value="productor">Productor (Gestionar fincas y lotes)</option>
                <option value="comprador">Comprador (Restaurante/Hotel)</option>
            </select>
            <br>
            <button type="submit" class="btn-accion">Registrarse</button>
        </form>
    </main>
</body>
</html>
