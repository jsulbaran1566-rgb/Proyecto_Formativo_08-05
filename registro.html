<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="imagenes.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amaranth:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <!-- Google Icons -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <title>Registro - AgroDirecto</title>
</head>
<body>

<nav id="nav-principal">
    <a href="index.html"><strong>AGRODIRECTO</strong></a>
    <div class="links-nav">
        <a href="index.html">← Volver al Inicio</a>
    </div>
</nav>

<main class="pantalla-login">
    <div class="caja-formulario caja-formulario-grande con-foto-superior">

        <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=700&q=80"
             alt="Campo de cultivo al amanecer"
             class="foto-formulario">

        <h2>Crear Cuenta</h2>
        <p>Unase a la plataforma de comercio agricola directo en Colombia.</p>

        <form id="form-registro">

            <div class="fila-campos">
                <div class="campo-grupo">
                    <label for="reg-tipo-doc">Tipo de Documento</label>
                    <select id="reg-tipo-doc" class="campo-input" required>
                        <option value="">— Seleccione —</option>
                        <option value="CC">Cedula de Ciudadania (CC)</option>
                        <option value="NIT">NIT</option>
                        <option value="CE">Cedula de Extranjeria (CE)</option>
                        <option value="PP">Pasaporte</option>
                    </select>
                </div>

                <div class="campo-grupo">
                    <label for="reg-id">Numero de Identificacion</label>
                    <input type="text" id="reg-id" class="campo-input"
                           placeholder="Ej: 1234567890" required>
                </div>
            </div>

            <div class="campo-grupo">
                <label for="reg-nombre">Nombre Completo / Razon Social</label>
                <input type="text" id="reg-nombre" class="campo-input"
                       placeholder="Ej: Finca El Paraiso SAS" required>
            </div>

            <div class="campo-grupo">
                <label for="reg-correo">Correo Electronico</label>
                <input type="email" id="reg-correo" class="campo-input"
                       placeholder="correo@empresa.com" required>
            </div>

            <div class="campo-grupo">
                <label for="reg-telefono">Telefono / WhatsApp</label>
                <input type="tel" id="reg-telefono" class="campo-input"
                       placeholder="+57 300 000 0000">
            </div>

            <div class="campo-grupo">
                <label for="reg-rol">Yo soy un...</label>
                <select id="reg-rol" class="campo-input" required>
                    <option value="">— Seleccione su perfil —</option>
                    <option value="Productor">🌾 Productor — Gestionar fincas y lotes</option>
                    <option value="Comprador">🏪 Comprador — Restaurante / Hotel / Distribuidor</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label for="reg-clave">Contraseña</label>

                <div class="contenedor-password">
                    <input type="password" id="reg-clave"
                           class="campo-input"
                           placeholder="Minimo 8 caracteres"
                           minlength="8"
                           required>

                    <button type="button"
                            id="btn-ver-reg"
                            onclick="toggleRegClave('reg-clave','btn-ver-reg')"
                            title="Mostrar/ocultar contrasena">

                        <span class="material-symbols-outlined">
                            visibility
                        </span>
                    </button>
                </div>
            </div>

            <div class="campo-grupo">
                <label for="reg-clave2">Confirmar Contraseña</label>

                <div class="contenedor-password">
                    <input type="password" id="reg-clave2"
                           class="campo-input"
                           placeholder="Repita su contraseña"
                           minlength="8"
                           required>

                    <button type="button"
                            id="btn-ver-reg2"
                            onclick="toggleRegClave('reg-clave2','btn-ver-reg2')"
                            title="Mostrar/ocultar contrasena">

                        <span class="material-symbols-outlined">
                            visibility
                        </span>
                    </button>
                </div>
            </div>

            <div class="accion-formulario">
                <button type="submit" id="btn-registrar" class="btn-verde">
                    Crear mi Cuenta
                </button>
            </div>
        </form>

        <div class="pie-form">
            Ya tiene cuenta?
            <a href="login.html">Inicie sesion aqui</a>
        </div>
    </div>
</main>

<footer id="pie-pagina">
    <p><strong>AgroDirecto</strong> — Del campo a su negocio, sin rodeos. 2026</p>
</footer>

<script src="datos.js"></script>

<script>
function toggleRegClave(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);

    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `
            <span class="material-symbols-outlined">
                visibility_off
            </span>
        `;
    } else {
        input.type = 'password';
        btn.innerHTML = `
            <span class="material-symbols-outlined">
                visibility
            </span>
        `;
    }
}

document.getElementById('form-registro').addEventListener('submit', (e) => {
    e.preventDefault();

    const btn = document.getElementById('btn-registrar');
    btn.textContent = 'Creando cuenta...';
    btn.disabled = true;

    const correo = document.getElementById('reg-correo').value.trim();
    const rol = document.getElementById('reg-rol').value;
    const clave = document.getElementById('reg-clave').value;
    const clave2 = document.getElementById('reg-clave2').value;
    const tipodoc = document.getElementById('reg-tipo-doc').value;

    if (!tipodoc) {
        mostrarAlerta('alerta-registro', 'Por favor seleccione un tipo de documento.', 'error');
        btn.textContent = 'Crear mi Cuenta';
        btn.disabled = false;
        return;
    }

    if (!rol) {
        mostrarAlerta('alerta-registro', 'Por favor seleccione un rol.', 'error');
        btn.textContent = 'Crear mi Cuenta';
        btn.disabled = false;
        return;
    }

    if (clave !== clave2) {
        mostrarAlerta('alerta-registro', 'Las contrasenas no coinciden.', 'error');
        btn.textContent = 'Crear mi Cuenta';
        btn.disabled = false;
        return;
    }

    if (DB.usuarios.find(u => u.correo === correo)) {
        mostrarAlerta('alerta-registro', 'Ya existe una cuenta con ese correo.', 'error');
        btn.textContent = 'Crear mi Cuenta';
        btn.disabled = false;
        return;
    }

    const nuevo = {
        id: DB.siguienteId('usuarios'),
        nombre: document.getElementById('reg-nombre').value.trim(),
        correo,
        telefono: document.getElementById('reg-telefono').value.trim(),
        rol,
        clave,
        estado: 'Activo'
    };

    DB.usuarios.push(nuevo);

    if (rol === 'Comprador') {
        DB.compradores.push({
            id: nuevo.id,
            nombre: nuevo.nombre,
            ciudad: '—'
        });
    }

    mostrarAlerta('exito-registro', '¡Cuenta creada con exito! Redirigiendo al login...', 'ok');
    document.getElementById('form-registro').reset();

    setTimeout(() => location.href = 'login.html', 2000);

    btn.textContent = 'Crear mi Cuenta';
    btn.disabled = false;
});

function mostrarAlerta(id, texto, tipo) {
    let el = document.getElementById(id);

    if (!el) {
        el = document.createElement('div');
        el.id = id;
        document.querySelector('.caja-formulario').appendChild(el);
    }

    el.className = `alerta alerta-${tipo} visible`;
    el.textContent = texto;
}
</script>

</body>
</html>
